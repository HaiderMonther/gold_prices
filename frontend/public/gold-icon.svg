<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#B8860B;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Gold bar shape -->
  <rect x="15" y="35" width="70" height="35" rx="5" ry="5" fill="url(#goldGrad)" />
  <rect x="22" y="28" width="56" height="12" rx="3" ry="3" fill="url(#goldGrad)" />
  <!-- Shine effect -->
  <rect x="25" y="42" width="18" height="5" rx="2" ry="2" fill="#FFEC8B" opacity="0.7"/>
  <!-- Au text -->
  <text x="50" y="60" text-anchor="middle" font-family="serif" font-size="18" font-weight="bold" fill="#5C3A00">Au</text>
</svg>
