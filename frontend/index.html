<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/gold-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="نظام إدارة محلات الذهب - إدارة المبيعات والمخزون والفواتير" />
    <title>نظام محلات الذهب - الذهبي</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
      [v-cloak] { display: none; }
      body {
        background-color: #F8F9FA;
        font-family: 'Tajawal', 'Inter', sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      // Initialize Lucide icons after DOM content is loaded
      // Since we use Vue, we might need to call this after each render or use a Vue component
      window.refreshIcons = () => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      };
    </script>
  </body>
</html>
